name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-api
  APP_VERSION: ${{ github.sha }}

jobs:
  # ─── Stage 1: Test ────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run unit tests
        run: |
          cd app
          pytest test_app.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: app/.pytest_cache/

  # ─── Stage 2: Build & Push Docker Image ───────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}

  # ─── Stage 3: Deploy to Kubernetes ────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set image in deployment
        run: |
          IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          kubectl set image deployment/flask-api \
            flask-api=${{ env.DOCKER_IMAGE }}:${IMAGE_TAG} \
            -n devops-app

      - name: Update app version in configmap
        run: |
          kubectl patch configmap flask-api-config \
            -n devops-app \
            --patch '{"data":{"APP_VERSION":"${{ github.sha }}"}}'

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/flask-api \
            -n devops-app --timeout=120s

      - name: Verify deployment
        run: |
          echo "=== Pods ==="
          kubectl get pods -n devops-app
          echo ""
          echo "=== Service ==="
          kubectl get svc -n devops-app
          echo ""
          echo "✅ Deployment successful! Version: ${{ github.sha }}"

      - name: Notify on success
        run: |
          echo "🚀 Deployed ${{ env.DOCKER_IMAGE }}:$(echo ${{ github.sha }} | cut -c1-7) to Kubernetes"
