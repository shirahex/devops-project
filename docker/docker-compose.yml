version: "3.9"

services:
  api:
    build:
      context: ./app
      dockerfile: ../docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - APP_VERSION=1.0.0
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
